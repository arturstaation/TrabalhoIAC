# ===========================================================================
# Configuração do Ansible para o Trabalho Final de IaC
# Referência: Aulas 3 (inventário), 5 (vault) e 6 (configuração via ansible.cfg)
# ===========================================================================
[defaults]
# Inventário padrão — evita ter de passar -i a cada comando (Aula 6)
inventory = ./inventory/hosts.ini

# Diretório onde o Ansible procura as roles (Aula 4)
roles_path = ./roles

# Onde estão as collections instaladas via requirements.yml (Aula 7)
collections_path = ./collections:~/.ansible/collections

# Não pedir confirmação de host key na primeira conexão SSH (ambiente de lab)
host_key_checking = False

# Usuário e interpretador padrão
remote_user = ubuntu
interpreter_python = auto_silent

# Saída mais legível
stdout_callback = yaml
nocows = 1

# Para usar arquivo de senha do Vault automaticamente, descomente:
# vault_password_file = ./.vault_pass

[privilege_escalation]
# become = sudo (Aula 4 e 5)
become = False
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Acelera execuções reaproveitando conexões SSH
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
