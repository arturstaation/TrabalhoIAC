---
# ===========================================================================
# Handlers da role hardening (Aula 4 - handlers/main.yml).
# São disparados via "notify" pelas tasks, e só executam se houve mudança.
# ===========================================================================

- name: Reiniciar SSH
  ansible.builtin.service:
    name: ssh
    state: restarted

- name: Reiniciar fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
