# ===========================================================================
# Inventário estático (formato INI) — Aula 3 (slide 26) e Aula 6 (slide 10)
# ---------------------------------------------------------------------------
# Este arquivo é REESCRITO automaticamente pelo Terraform quando você usa a AWS
# (ver terraform/main.tf -> recurso local_file). Para teste local com Docker,
# use o grupo [local] abaixo.
# ===========================================================================

# --- Caminho A: servidor provisionado na AWS via Terraform ---
# (a linha abaixo é um exemplo; o Terraform substitui pelo IP real)
[aws]
# servidor-aws ansible_host=SEU_IP_PUBLICO ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# --- Caminho B: container Docker local (gratuito, para testes) ---
[local]
servidor-linux ansible_connection=docker ansible_host=servidor-linux

# --- Grupo "servidores": alvo dos playbooks (engloba os dois caminhos) ---
[servidores:children]
aws
local

# Variáveis comuns ao grupo (Aula 6 — variáveis de grupo)
[servidores:vars]
ansible_python_interpreter=/usr/bin/python3
