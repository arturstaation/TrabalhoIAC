---
# ===========================================================================
# Variáveis PÚBLICAS do projeto (versionáveis em Git) — Aula 6
# Os valores sensíveis (senhas) ficam em vault.yml e são apenas referenciados
# aqui via vault_*  (padrão recomendado na Aula 5).
# ===========================================================================

# --------------------------------------------------------------------------
# 1) CONFIGURAÇÃO INICIAL (role configuracao_inicial)
# --------------------------------------------------------------------------
# Fuso horário do servidor
timezone: "America/Sao_Paulo"

# Pacotes base instalados em todo servidor novo
pacotes_base:
  - curl
  - wget
  - vim
  - git
  - htop
  - net-tools
  - unzip
  - tree
  - ca-certificates
  - gnupg

# Usuário administrativo criado no servidor
admin_user: "deploy"
admin_group: "devops"
# A senha vem do cofre (vault.yml) — nunca em texto puro aqui (Aula 5)
admin_password: "{{ vault_admin_password }}"

# Chave pública SSH autorizada para o usuário admin (cole a SUA chave pública)
admin_ssh_public_key: "{{ vault_admin_ssh_public_key | default('') }}"

# --------------------------------------------------------------------------
# 2) GERENCIAMENTO DE PACOTES (role gerenciamento_pacotes)
# --------------------------------------------------------------------------
# Pacotes a INSTALAR
pacotes_instalar:
  - nginx
  - python3-pip

# Pacotes a ATUALIZAR para a última versão
pacotes_atualizar:
  - openssl
  - curl

# Pacotes a REMOVER (serviços/ferramentas indesejadas)
pacotes_remover:
  - telnet
  - rsh-client

# Executar 'apt upgrade' completo do sistema?
atualizar_sistema_completo: true

# --------------------------------------------------------------------------
# 3) HARDENING DE SEGURANÇA (role hardening)
# --------------------------------------------------------------------------
# Porta do SSH (mantida 22; altere se quiser endurecer mais)
ssh_port: 22

# Usuários autorizados a logar via SSH
ssh_allowed_users: "{{ admin_user }} ubuntu"

# Regras de firewall (UFW) — portas liberadas
firewall_portas_liberadas:
  - { porta: "{{ ssh_port }}", proto: "tcp", desc: "SSH" }
  - { porta: "80",            proto: "tcp", desc: "HTTP" }
  - { porta: "443",           proto: "tcp", desc: "HTTPS" }
  - { porta: "9100",          proto: "tcp", desc: "Prometheus Node Exporter" }

# Serviços não utilizados a desativar
servicos_desativar:
  - avahi-daemon
  - cups
  - rpcbind

# Política de senhas (login.defs / pwquality)
politica_senha:
  pass_max_days: 90
  pass_min_days: 1
  pass_warn_age: 7
  pass_min_len: 14

# Instalar e habilitar fail2ban (proteção contra brute-force SSH)?
habilitar_fail2ban: true

# --------------------------------------------------------------------------
# 4) MONITORAMENTO E LOGGING (role monitoramento)
# --------------------------------------------------------------------------
# Versão do Prometheus Node Exporter
node_exporter_version: "1.8.2"
node_exporter_port: 9100

# Centralização de logs via rsyslog para um servidor remoto?
# (deixe vazio para apenas configurar rotação local)
log_servidor_remoto: ""        # ex.: "10.0.0.50"
log_servidor_porta: 514

# --------------------------------------------------------------------------
# 5) BACKUP E RECUPERAÇÃO (role backup)
# --------------------------------------------------------------------------
# Diretórios críticos que entram no backup
backup_diretorios:
  - /etc
  - /home
  - /var/www

# Onde os backups ficam armazenados localmente
backup_destino: "/var/backups/trabalho-iac"

# Quantos dias manter backups antigos (retenção)
backup_retencao_dias: 7

# Agendamento do cron (todo dia às 02:30)
backup_cron_hora: "2"
backup_cron_minuto: "30"
