# ===========================================================================
# Collections do Ansible Galaxy usadas pelas roles (Aula 7)
# Instale com:  ansible-galaxy collection install -r requirements.yml
# ===========================================================================
collections:
  # Módulos ufw, pam_limits, etc. usados no hardening (Aula 5)
  - name: community.general
    version: ">=7.0.0"

  # Módulos apt, user, group, service, cron, systemd, lineinfile, copy, template
  - name: ansible.posix
    version: ">=1.5.0"

